<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Việt Anh - Nền Tảng Cung Cấp Tool Dịch Thuật </title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Hiệu ứng gradient nền tĩnh */
        .bg-grid-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-grid-pattern text-slate-800 relative">

    <!-- Header Glassmorphism -->
    <header class="sticky top-0 z-40 backdrop-blur-md bg-white/70 border-b border-slate-200/50 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <span class="text-white font-bold text-lg">V</span>
                </div>
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">Việt Anh</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-slate-500 text-sm hidden sm:block">Chào mừng bạn!</span>
                <!-- THÊM ID VÀO NÚT NÀY -->
                <a id="header-auth-btn" href="account.html" class="inline-block bg-slate-900 text-white px-5 py-2 rounded-full font-semibold text-sm hover:bg-indigo-600 hover:shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform hover:-translate-y-0.5 text-center">
                    Đăng nhập
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-8 px-4 pb-20">
        
        <!-- Banner/Hero Section -->
        <div data-aos="fade-down" class="mb-10 text-center py-10 rounded-3xl bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 text-white shadow-2xl relative overflow-hidden">
            <!-- Vòng tròn trang trí mờ ảo -->
            <div class="absolute top-0 left-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
            <div class="absolute top-0 right-0 w-64 h-64 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
            
            <h1 class="text-4xl md:text-5xl font-bold mb-4 z-10 relative tracking-tight">Tối Ưu Hóa Công Việc Của Bạn</h1>
            <p class="text-blue-200 text-lg md:text-xl max-w-2xl mx-auto z-10 relative">Cung cấp các công cụ tự động hóa, tool MMO mạnh mẽ và an toàn nhất hiện nay.</p>
        </div>

        <!-- Khung hiển thị số dư (Dashboard Stats) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div data-aos="fade-up" data-aos-delay="100" class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-blue-100 transition-all duration-300 transform hover:-translate-y-1 flex items-center">
                <div class="bg-gradient-to-br from-green-400 to-emerald-600 p-4 rounded-xl mr-5 text-white shadow-lg shadow-green-500/30 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-1">Số Dư Hiện Có</h3>
                    <p class="text-3xl font-bold text-slate-800">0<span class="text-lg text-slate-500 ml-1">VND</span></p>
                </div>
            </div>

            <div data-aos="fade-up" data-aos-delay="200" class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-pink-100 transition-all duration-300 transform hover:-translate-y-1 flex items-center">
                <div class="bg-gradient-to-br from-pink-400 to-rose-600 p-4 rounded-xl mr-5 text-white shadow-lg shadow-pink-500/30 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                </div>
                <div>
                    <h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-1">Tổng Tiền Đã Tiêu</h3>
                    <p class="text-3xl font-bold text-slate-800">0<span class="text-lg text-slate-500 ml-1">VND</span></p>
                </div>
            </div>
        </div>

        <!-- Tiêu đề danh sách Tool -->
        <div data-aos="fade-right" class="mb-8 flex items-center gap-3">
            <div class="h-8 w-2 bg-blue-600 rounded-full"></div>
            <h2 class="text-3xl font-bold text-slate-800">Sản Phẩm <span class="text-blue-600">Nổi Bật</span></h2>
        </div>

        <!-- Lưới sản phẩm (Grid) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            
            <!-- Sản phẩm 1: AI Video Translator -->
            <a href="ai-video-translator.html" data-aos="fade-up" data-aos-delay="100" class="group bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-2xl hover:shadow-blue-500/10 transition-all duration-500 transform hover:-translate-y-2 flex flex-col">
                <div class="relative h-48 overflow-hidden bg-slate-100">
                    <!-- Ảnh sẽ zoom nhẹ khi hover -->
                    <img src="image_3de87f.jpg" alt="AI Video" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out">
                    <div class="absolute top-3 left-3 bg-red-500/90 backdrop-blur-sm text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">
                        HOT
                    </div>
                </div>
                <div class="p-5 flex-grow flex flex-col">
                    <h3 class="font-bold text-slate-800 text-lg mb-2 line-clamp-2 group-hover:text-blue-600 transition-colors">[ Tool ] AI Video Translator Pro</h3>
                    <p class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-green-500 to-emerald-600 mt-auto">10,000đ</p>
                    <div class="flex items-center justify-between mt-3 text-sm text-slate-500">
                        <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg> 5.0</span>
                        <span>Đã bán: 0</span>
                    </div>
                </div>
                <div class="px-5 pb-5">
                    <button class="w-full bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                        XEM CHI TIẾT
                    </button>
                </div>
            </a>
        </div>
    </main>

    <a href="https://www.facebook.com/viettran.213" target="_blank" class="fixed bottom-6 right-6 bg-gradient-to-r from-blue-600 to-blue-500 text-white p-3.5 rounded-full shadow-lg shadow-blue-500/40 hover:shadow-2xl hover:shadow-blue-500/60 transition-all duration-300 z-50 flex items-center justify-center group cursor-pointer animate-bounce">
        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clip-rule="evenodd" /></svg>
        <span class="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs group-hover:ml-3 transition-all duration-500 ease-in-out font-semibold text-sm">
            Chat với Admin
        </span>
    </a>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 800 });

        // === THÊM ĐOẠN JS NÀY ĐỂ CHECK TRẠNG THÁI ĐĂNG NHẬP ===
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('ae_is_logged_in');
            const authBtn = document.getElementById('header-auth-btn');
            
            if (isLoggedIn === 'true' && authBtn) {
                // Đổi chữ "Đăng nhập" thành "Tài khoản" nếu đã đăng nhập
                authBtn.innerText = 'Tài khoản';
                // Đổi màu nút sang xanh lá để tạo điểm nhấn đã đăng nhập
                authBtn.className = 'inline-block bg-emerald-500 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-emerald-600 hover:shadow-lg hover:shadow-emerald-500/30 transition-all duration-300 transform hover:-translate-y-0.5 text-center';
            }
        });
    </script>
</body>
</html>
